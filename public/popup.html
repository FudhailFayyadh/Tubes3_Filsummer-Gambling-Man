<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Judol Detector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      background: #0d0d1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, sans-serif;
      font-size: 13px;
    }

    .header {
      background: linear-gradient(135deg, #1a1a3e, #2d1b69);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #2a2a4a;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.3px;
    }

    .badge {
      background: #e74c3c;
      color: #fff;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge.safe    { background: #27ae60; }
    .badge.pending { background: #f39c12; }

    .content { padding: 14px 16px; }

    .section { margin-bottom: 16px; }

    .section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #666;
      margin-bottom: 8px;
    }

    /* ── Total count ── */
    .total-count {
      font-size: 42px;
      font-weight: 800;
      color: #e74c3c;
      line-height: 1;
      margin-bottom: 3px;
    }

    .total-count.zero { color: #27ae60; }

    .total-label { font-size: 11px; color: #666; }

    /* ── Bar chart ── */
    .bar-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
    }

    .bar-label {
      width: 54px;
      font-size: 11px;
      font-weight: 600;
      color: #aaa;
      flex-shrink: 0;
      text-align: right;
    }

    .bar-track {
      flex: 1;
      height: 20px;
      background: #1a1a2e;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      min-width: 2px;
      display: flex;
      align-items: center;
      padding-left: 6px;
      transition: width 0.35s ease;
    }

    .bar-fill.kmp   { background: linear-gradient(90deg, #2980b9, #3498db); }
    .bar-fill.bm    { background: linear-gradient(90deg, #8e44ad, #9b59b6); }
    .bar-fill.regex { background: linear-gradient(90deg, #d35400, #e67e22); }
    .bar-fill.fuzzy { background: linear-gradient(90deg, #27ae60, #2ecc71); }

    .bar-value {
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }

    /* ── Stats table ── */
    .stats-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    .stats-table th {
      color: #555;
      font-weight: 600;
      text-align: left;
      padding: 4px 6px;
      border-bottom: 1px solid #1e1e3a;
    }

    .stats-table td {
      padding: 5px 6px;
      border-bottom: 1px solid #141426;
      color: #ccc;
    }

    .stats-table tbody tr:hover td { background: #161630; }

    .algo-tag {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
    }

    .algo-tag.kmp   { background: #2980b9; }
    .algo-tag.bm    { background: #8e44ad; }
    .algo-tag.regex { background: #d35400; }
    .algo-tag.fuzzy { background: #27ae60; }

    .empty-state {
      text-align: center;
      color: #444;
      padding: 12px 0;
      font-size: 12px;
    }

    /* ── Rescan button ── */
    #rescan-btn {
      width: 100%;
      padding: 9px;
      background: linear-gradient(135deg, #2980b9, #3498db);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 4px;
    }

    #rescan-btn:hover   { opacity: 0.88; }
    #rescan-btn:active  { opacity: 0.75; }
    #rescan-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      background: #555;
    }

    #rescan-btn.scanning {
      background: linear-gradient(135deg, #d35400, #e67e22);
    }

    .timestamp {
      font-size: 10px;
      color: #333;
      text-align: right;
      margin-top: 8px;
    }

    .ocr-box {
      background: #111128;
      border: 1px solid #1e1e3a;
      border-radius: 6px;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ocr-icon { font-size: 20px; }

    .ocr-text { flex: 1; }

    .ocr-text .ocr-main {
      font-size: 13px;
      font-weight: 600;
      color: #ddd;
    }

    .ocr-text .ocr-sub {
      font-size: 11px;
      color: #555;
      margin-top: 2px;
    }

    .ocr-count {
      font-size: 22px;
      font-weight: 800;
      color: #e74c3c;
    }

    .ocr-count.zero { color: #27ae60; }

    .algo-tag.rk { background: #16a085; }
    .bar-fill.rk { background: linear-gradient(90deg, #1abc9c, #16a085); }
  </style>
</head>
<body>

  <div class="header">
    <h1>🎰 Judol Detector</h1>
    <span class="badge pending" id="status-badge">Memuat...</span>
  </div>

  <div class="content">

    <div class="section">
      <div class="section-title">Total Keyword Terdeteksi</div>
      <div class="total-count zero" id="total-count">0</div>
      <div class="total-label">keyword judi ditemukan di halaman ini</div>
    </div>

    <div class="section">
      <div class="section-title">Perbandingan Algoritma</div>
      <div id="chart-container">
        <div class="empty-state">Belum ada data scan</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Statistik Eksekusi</div>
      <table class="stats-table">
        <thead>
          <tr>
            <th>Algoritma</th>
            <th>Match</th>
            <th>Waktu</th>
            <th>Komparasi</th>
          </tr>
        </thead>
        <tbody id="stats-body">
          <tr>
            <td colspan="4" class="empty-state">Belum ada data</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="section">
      <div class="section-title">OCR Gambar</div>
      <div class="ocr-box">
        <div class="ocr-icon">🖼️</div>
        <div class="ocr-text">
          <div class="ocr-main" id="ocr-main">Belum ada scan gambar</div>
          <div class="ocr-sub" id="ocr-sub"></div>
        </div>
        <div class="ocr-count zero" id="ocr-count">—</div>
      </div>
    </div>

    <button id="rescan-btn">Rescan Halaman Ini</button>

    <div class="timestamp" id="timestamp"></div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
